<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#b91c1c" />
    </linearGradient>
  </defs>
  <!-- Background Shield/Grid element -->
  <rect x="10" y="10" width="80" height="80" rx="15" fill="none" stroke="url(#blueGrad)" stroke-width="2" stroke-dasharray="4,2" />
  <!-- Isometric 3D Box/Building Blueprint -->
  <path d="M50 20 L80 35 L80 65 L50 80 L20 65 L20 35 Z" fill="none" stroke="url(#blueGrad)" stroke-width="4" stroke-linejoin="round" />
  <path d="M50 20 L50 80" fill="none" stroke="url(#blueGrad)" stroke-width="2" />
  <path d="M20 35 L50 50 L80 35" fill="none" stroke="url(#blueGrad)" stroke-width="2" />
  <!-- Risk Nodes (Pulse elements representing prediction) -->
  <circle cx="35" cy="42" r="5" fill="url(#redGrad)" />
  <circle cx="65" cy="58" r="5" fill="url(#redGrad)" />
  <circle cx="50" cy="35" r="4" fill="#10b981" />
  <!-- AI Connections (Lines connecting nodes) -->
  <line x1="35" y1="42" x2="50" y2="35" stroke="#10b981" stroke-width="1.5" stroke-dasharray="2,2" />
  <line x1="65" y1="58" x2="50" y2="80" stroke="url(#blueGrad)" stroke-width="1.5" />
  <!-- IA letters inside center -->
  <text x="50" y="58" font-family="system-ui, sans-serif" font-size="12" font-weight="900" fill="url(#blueGrad)" text-anchor="middle">PR3D</text>
</svg>